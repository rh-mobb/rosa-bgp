apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: test-vm-cudn
  namespace: cudn1
  labels:
    app: test-vm
spec:
  running: true
  template:
    metadata:
      labels:
        kubevirt.io/vm: test-vm-cudn
    spec:
      domain:
        devices:
          disks:
          - disk:
              bus: virtio
            name: containerdisk
          - disk:
              bus: virtio
            name: cloudinitdisk
          interfaces:
          - name: default
            bridge: {}
        resources:
          requests:
            memory: 1Gi
            cpu: 1
      networks:
      - name: default
        pod: {}
      volumes:
      - name: containerdisk
        containerDisk:
          image: quay.io/kubevirt/fedora-cloud-container-disk-demo:latest
      - name: cloudinitdisk
        cloudInitNoCloud:
          userData: |
            #cloud-config
            password: fedora
            chpasswd: { expire: False }
            ssh_pwauth: True
            packages:
              - httpd
            runcmd:
              - systemctl enable httpd
              - systemctl start httpd
              - echo "<h1>Test VM on CUDN Network</h1><p>IP: $(hostname -I)</p>" > /var/www/html/index.html
