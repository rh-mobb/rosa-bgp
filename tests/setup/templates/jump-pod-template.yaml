apiVersion: v1
kind: Pod
metadata:
  name: ${POD_NAME}
  namespace: ${POD_NAMESPACE}
spec:
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault
  containers:
  - name: ${POD_NAME}
    image: registry.access.redhat.com/ubi9/toolbox:latest
    command: ["sleep", "infinity"]
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop: ["ALL"]
      runAsNonRoot: true
      runAsUser: 1000
    volumeMounts:
    - name: ssh-key
      mountPath: /home/test-user/.ssh
      readOnly: true
  volumes:
  - name: ssh-key
    secret:
      secretName: test-vm-ssh-key
      defaultMode: 0400
